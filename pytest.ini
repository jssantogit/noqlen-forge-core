[pytest]
markers =
    unit: pure or near-pure unit tests without heavy filesystem or MusicLab
    contract: interface and service/provider contract tests with fake dependencies
    slow: slow integration tests
    lab: MusicLab integration tests
    integration: integration tests
    provider: provider integration or provider decision tests
    db: SQLite database tests
    lyrics: lyrics selection, writing, and provider tests
    navidrome: Navidrome fake/mock tests
    playlist: playlist and smart playlist tests
    cli: CLI parsing and adapter tests
    service: service contract and WorkflowResult tests
    filesystem: tests using temporary files or fixture media
    network_fake: fake/mock network boundary tests; never real internet
    release: release-only validation checks
