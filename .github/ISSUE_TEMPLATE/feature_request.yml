name: Feature request
description: Propose a focused Noqlen Forge Core improvement.
title: "Feature: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Keep requests focused on a concrete Noqlen Forge Core use case. Avoid broad ecosystem requests unless you can explain why the work belongs in Forge now.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What safe workflow or user need would this improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the smallest useful behavior or documentation change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Safer alternatives considered
      description: Include dry-run, reporting, review, or read-only alternatives if relevant.
  - type: dropdown
    id: real_files
    attributes:
      label: Would this affect real files or external services?
      options:
        - "No, read-only/reporting only"
        - "Yes, it may write files or metadata"
        - "Yes, it may affect an external service"
        - "Not sure"
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety expectations
      options:
        - label: This should support dry-run output.
        - label: This should produce a report or plan before writes.
        - label: This should include review steps for uncertain results.
        - label: This should avoid printing private data.
  - type: dropdown
    id: product_area
    attributes:
      label: Where does this belong?
      options:
        - "Noqlen Forge Core now"
        - "Future Noqlen Flux direction"
        - "Future Noqlen Anchor direction"
        - "Future Noqlen Aria direction"
        - "Future shared Noqlen Core direction"
        - "Not sure"
    validations:
      required: true
